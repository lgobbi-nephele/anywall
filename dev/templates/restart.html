
<!DOCTYPE html>
<html>
<head>
    <title>Window Process Manager</title>
    <script>
        function restartWindows() {
            fetch('/api/restart-windows', {method: 'POST'})
                .then(response => response.json())
                .then(data => alert(data.message))
                .catch(error => alert('Error: ' + error));
        }
    </script>
</head>
<body>
    <button onclick="restartWindows()">Restart All Windows</button>
</body>
</html>
