
<!DOCTYPE html>
<html>
<head>
    <title>Window Process Control</title>
    <script>
        function restartWindows() {
            fetch('http://0.0.0.0:5000/api/force-restart-windows', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error restarting windows');
            });
        }
    </script>
    <style>
        .restart-btn {
            padding: 10px 20px;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .restart-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <button class="restart-btn" onclick="restartWindows()">Restart All Windows</button>
</body>
</html>
